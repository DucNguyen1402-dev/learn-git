<!DOCTYPE html>
<html lang="vi">
<head>
  <script src="https://cdn.tailwindcss.com"></script>
    <script>
    window.tailwind = window.tailwind || {};
    window.tailwind.config = {
      darkMode: "class"
    };
  </script>
  <title>Git & Github demo</title>

    <script src="script.js" defer></script>

</head>
<body class="bg-white dark:bg-slate-900 transition duration-300">

<!-- switch mode button -->
   <button 
      data-btn="switch-mode"
      class="
      absolute right-2 top-2 p-2 
      flex items-center justify-center
      rounded-full
      bg-gradient-to-r from-sky-400 via-blue-500 to-indigo-500 
      dark:bg-gradient-to-t dark:from-blue-500/70 dark:via-slate-600 dark:to-slate-700
      transition-all duration-300
      hover:brightness-110"

    >
      <img data-img="icon" class="size-8" src="./img/night-mode.png" alt="Night mode icon">
    </button>


    <!-- login feature -->
    <div class="bg-white p-8 mx-auto my-10 rounded-xl shadow-md w-full max-w-md">
        <div class="text-center mb-8">
            <h2 class="text-2xl font-bold text-gray-800">Chào mừng trở lại</h2>
            <p class="text-gray-500 text-sm">Vui lòng đăng nhập vào tài khoản của bạn</p>
        </div>

        <form action="#" method="POST" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" placeholder="email@example.com" 
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none transition">
            </div>

            <div>
                <div class="flex justify-between mb-1">
                    <label class="block text-sm font-medium text-gray-700">Mật khẩu</label>
                    <a href="#" class="text-xs text-blue-600 hover:underline">Quên mật khẩu?</a>
                </div>
                <input type="password" placeholder="••••••••" 
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none transition">
            </div>

            <div class="flex items-center">
                <input type="checkbox" id="remember" class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 rounded">
                <label for="remember" class="ml-2 text-sm text-gray-600">Ghi nhớ đăng nhập</label>
            </div>

            <button type="submit" 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 rounded-lg transition duration-300 shadow-lg shadow-blue-200">
                Đăng nhập
            </button>
        </form>

        <div class="mt-6 text-center">
            <p class="text-xs text-gray-400 uppercase tracking-wider mb-4 font-semibold">Hoặc tiếp tục với</p>
            <button class="w-full flex items-center justify-center gap-2 border border-gray-300 py-2 rounded-lg hover:bg-gray-50 transition">
                <img src="https://www.svgrepo.com/show/355037/google.svg" class="w-5 h-5" alt="Google">
                <span class="text-sm font-medium text-gray-700">Google</span>
            </button>
        </div>

        <p class="mt-8 text-center text-sm text-gray-600">
            Chưa có tài khoản? <a href="#" class="text-blue-600 font-semibold hover:underline">Đăng ký ngay</a>
        </p>
    </div>

</body>
</html>
